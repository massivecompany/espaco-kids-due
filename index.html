<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço Kids - Monitoramento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }
        header {
            text-align: center;
            margin-bottom: 15px;
        }
        header h1 {
            font-size: 1.5rem;
            color: #ff9800;
        }
        header p {
            font-size: 0.9rem;
            color: #aaaaaa;
        }
        .grid-cameras {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 800px;
        }
        .camera-box {
            position: relative;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        .camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #fff;
        }
        footer {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>DUE - Espaço Kids</h1>
        <p>Acompanhe seu filho em tempo real</p>
    </header>

    <div class="grid-cameras">
        <div class="camera-box">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=1&u=cliente&p=Due@kids" alt="Câmera 1" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=1&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Brinquedão (Canal 1)</div>
        </div>

        <div class="camera-box">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=2&u=cliente&p=Due@kids" alt="Câmera 2" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=2&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Piscina de Bolinhas (Canal 2)</div>
        </div>

        <div class="camera-box">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=3&u=cliente&p=Due@kids" alt="Câmera 3" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=3&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Jogos (Canal 3)</div>
        </div>

        <div class="camera-box">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=4&u=cliente&p=Due@kids" alt="Câmera 4" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=4&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Parquinho (Canal 4)</div>
        </div>
    </div>

    <footer>
        <p>Desenvolvido por Massive Access - Acesso restrito à rede Wi-Fi local</p>
    </footer>

</body>
</html>
