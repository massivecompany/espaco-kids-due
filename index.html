<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço Kids - Monitoramento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-pizzaria {
            max-width: 120px;
            height: auto;
            margin-bottom: 10px;
            border-radius: 50%;
        }
        header h1 {
            font-size: 1.6rem;
            color: #ff9800;
            margin-bottom: 4px;
        }
        header p {
            font-size: 0.95rem;
            color: #aaaaaa;
        }
        .grid-cameras {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 800px;
        }
        .camera-box {
            position: relative;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #fff;
            font-weight: bold;
            z-index: 10;
        }
        
        /* --- ESTILO PARA A TELA CHEIA (ZOOM) --- */
        .camera-box.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            z-index: 9999;
            border: none;
            border-radius: 0;
            aspect-ratio: auto;
        }
        .camera-box.fullscreen img {
            object-fit: contain; /* Mantém a proporção da câmera sem cortar as bordas */
            background-color: #000;
        }

        footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo Pizzaria" class="logo-pizzaria">
        <h1>DUE - Espaço Kids</h1>
        <p>Toque na câmera para ampliar</p>
    </header>

    <div class="grid-cameras">
        <div class="camera-box" onclick="toggleFullscreen(this)">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=1&u=cliente&p=Due@kids" alt="Câmera 1" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=1&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Campinho</div>
        </div>

        <div class="camera-box" onclick="toggleFullscreen(this)">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=2&u=cliente&p=Due@kids" alt="Câmera 2" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=2&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Escada</div>
        </div>

        <div class="camera-box" onclick="toggleFullscreen(this)">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=3&u=cliente&p=Due@kids" alt="Câmera 3" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=3&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Entrada</div>
        </div>

        <div class="camera-box" onclick="toggleFullscreen(this)">
            <img src="http://192.168.0.176:80/cgi-bin/snapshot.cgi?channel=4&u=cliente&p=Due@kids" alt="Câmera 4" onload="setTimeout(this.src=this.src.split('?')[0]+'?channel=4&u=cliente&p=Due@kids&t='+Math.random(), 1000)">
            <div class="camera-label">Area de bebes</div>
        </div>
    </div>

    <footer>
        <p>Desenvolvido por Massive Company LTDA <br> Acesso restrito à rede Wi-Fi local</p>
    </footer>

    <script>
        function toggleFullscreen(elemento) {
            // Se a câmera clicada já estiver em tela cheia, remove o efeito
            if (elemento.classList.contains('fullscreen')) {
                elemento.classList.remove('fullscreen');
            } else {
                // Remove de qualquer outra que esteja aberta antes (garantia)
                document.querySelectorAll('.camera-box').forEach(box => {
                    box.classList.remove('fullscreen');
                });
                // Aplica a tela cheia na câmera clicada
                elemento.classList.add('fullscreen');
            }
        }
    </script>

</body>
</html>
